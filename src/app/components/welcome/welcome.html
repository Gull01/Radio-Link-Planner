<div class="welcome-container">
  <div class="welcome-content">
    <div class="tower-animation">
      <div class="tower tower-1">
        <div class="tower-base"></div>
        <div class="tower-body"></div>
        <div class="tower-top"></div>
        <div class="signal-wave wave-1"></div>
        <div class="signal-wave wave-2"></div>
        <div class="signal-wave wave-3"></div>
      </div>
      <div class="connection-beam"></div>
      <div class="tower tower-2">
        <div class="tower-base"></div>
        <div class="tower-body"></div>
        <div class="tower-top"></div>
        <div class="signal-wave wave-1"></div>
        <div class="signal-wave wave-2"></div>
        <div class="signal-wave wave-3"></div>
      </div>
    </div>

    <h1 class="welcome-title">Radio Link Planner</h1>
    <p class="welcome-subtitle">Plan and analyze wireless communication links with terrain-aware line-of-sight analysis</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📍</div>
        <div class="feature-text">Place Towers</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔗</div>
        <div class="feature-text">Create Links</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">Analyze Profile</div>
      </div>
    </div>

    <button class="start-button" (click)="startApp()">
      <span>Get Started</span>
      <span class="arrow">→</span>
    </button>
  </div>
</div>
