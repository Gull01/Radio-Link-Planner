  <app-welcome (onStart)="onWelcomeStart()"></app-welcome>
}

@if (showLogin()) {
  <app-login (onLoginSuccess)="onLoginSuccess()"></app-login>
}

  <app-tabs></app-tabs>
  <router-outlet />
}

<app-notification></app-notification>
<app-confirm-dialog></app-confirm-dialog>
